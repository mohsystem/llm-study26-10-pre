spring.application.name=springbootprojstructure

# H2 + JPA
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
ddl-auto=update
# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Admin initializer (test setup mechanism)
app.bootstrap.admin.enabled=true
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=admin123
app.bootstrap.admin.email=admin@example.com

app.jwt.issuer=com.um.springbootprojstructure
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=1209600

# IMPORTANT: use a strong secret in real environments (>= 32 bytes)
app.jwt.secret=change-me-to-a-very-long-random-secret-at-least-32-bytes

app.ldap.enabled=true
spring.ldap.urls=ldap://ldap.mycompany.local:389
spring.ldap.base=dc=mycompany,dc=local
spring.ldap.username=cn=readonly,dc=mycompany,dc=local
spring.ldap.password=readonly-password

# Optional: where users live (used to narrow searches)
app.ldap.user-search-base=ou=users